name: python-app-2-cicd

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    outputs:
      commit_id: ${{ steps.sha.outputs.short }}
    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: jtandy/python-app-2:${{ steps.sha.outputs.short }}

  cd:
    needs: ci
    runs-on: self-hosted
    steps:
      -
        name: Checkout code
        uses: actions/checkout@v4

      -
        name: Modify values for Argo CD
        uses: mikefarah/yq@v4.45.1
        with:
          cmd: yq -i '.image.tag = "${{ needs.ci.outputs.commit_id }}"' charts/python-app-2/values-dev.yaml
      -
        name: Commit changes
        uses: EndBug/add-and-commit@v10
        with:
          message: "Updates values.yaml with commit id ${{ needs.ci.outputs.commit_id }}"
      -
        name: Install Argo CD CLI
        run: |
          # Grab the latest version number
          VERSION=$(curl -s "https://api.github.com/repos/argoproj/argo-cd/releases/latest" | grep '"tag_name"' | sed -E 's/.*"([^"]+)".*/\1/')

          # Download from GitHub directly using the -f flag so it fails instantly if it 404s
          curl -f -sSL -o argocd "https://github.com/argoproj/argo-cd/releases/download/$VERSION/argocd-linux-amd64"

          # Make executable and move to PATH
          chmod +x argocd
          sudo mv argocd /usr/local/bin/argocd
      -
        name: Configure and Sync Argo CD App
        shell: bash
        run: |
          # 1. Authenticate FIRST
          argocd login argocd-server.argocd \
            --insecure \
            --grpc-web \
            --username admin \
            --password ${{ secrets.ARGOCD_PASSWORD }}

          # 2. Connect the argocd repo
          repo="https://github.com/jtandy13-test-org/python-app-2.git"
          argocd repo list | grep -q $repo || argocd repo add $repo

          # 3. Create the argocd app
          argocd app get python-app-2 || argocd app create python-app-2 \
            --repo $repo \
            --path charts/python-app-2 \
            --dest-server https://kubernetes.default.svc \
            --dest-namespace dev \
            --values values-dev.yaml \
            --revision main \
            --sync-policy manual \
            --sync-option CreateNamespace=true
            
          # 4. Sync and Wait
          argocd app sync python-app-2
          argocd app wait python-app-2 --timeout 180